name: Biweekly Competitor Report

on:
  schedule:
    - cron: '0 1 9,23 * *'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate.js

      - name: Deploy to Surge
        run: npx surge dist https://moomoo-my-report.surge.sh --token ${{ secrets.SURGE_TOKEN }}
